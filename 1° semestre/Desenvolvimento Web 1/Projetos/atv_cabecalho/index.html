<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="index.css">
    <script src="index.js"></script>
    <link rel="icon" type="image/x-icon" href="img/cinema.png">
    <title>exercicio login com cabeçalho</title>
</head>

<body onload="local()">
    <header class="" id="head">
        <div class="center">
                <input class="results" id="nome" type="text" value="Bem vindo, Visitante!" disabled>
        </div>
    </header>


    <section>
        <div class="center">
            <div class="column">
                <div class="side">
                    <h4>Realize seu login</h4>
                    <input id="login" class="textInput" type="text" placeholder="Insira o seu nome">
                    <input id="senha" class="textInput" type="password" placeholder="Insira a sua senha">
                    <input id="logButton" type="button" class="action bk" value="Fazer login" onclick="logon()">
                    <span class="ok" id="span"></span>
                </div>
            </div>
        </div>
    </section>

</body>

</html>
